<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>media</title>
</head>

<body style="background-color:powderblue;">

<h2>curated media</h2>
<h4>loading list...</h4>

<!-- ADMIN PANEL -->
<div id="admin-panel" style="display:none; margin-bottom:20px;">
  <form id="add-media-form" style="display:none;">
    <input type="text" id="media-title" placeholder="Enter title" required />
    <input type="url" id="media-url" placeholder="Enter URL" required />
    <input type="text" id="media-category" placeholder="Enter category (optional)"/>
    <button type="submit">Add Media</button>
  </form>

  <button onclick="logout()">Logout</button>
</div>

<ul id="reading-list"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

/* ✅ SAME CONFIG (EXACT COPY) */
const firebaseConfig = {
  apiKey: "AIzaSyD7JjchLZ7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
  storageBucket: "egontd-b9357.firebasestorage.app",
  messagingSenderId: "241512022087",
  appId: "1:241512022087:web:0ad7a133f1d146fdc4b162"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ✅ ENSURE SESSION PERSISTENCE */
await setPersistence(auth, browserLocalPersistence);

const mediaCollection = collection(db, "mediaItems");

let mediaItems = [];
let isAdmin = false;

function unlockAdmin() {
  document.getElementById("admin-panel").style.display = "block";
  document.getElementById("add-media-form").style.display = "block";
}

/* ---------- FIREBASE CRUD ---------- */

async function fetchMediaItems() {
  const snapshot = await getDocs(mediaCollection);
  mediaItems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
}

async function addMediaItem(title, url, category = "") {
  await addDoc(mediaCollection, {
    title,
    url,
    category,
    isFavorite: false
  });

  fetchMediaItems();
}

async function updateMediaItem(id, updates) {
  await updateDoc(doc(db, "mediaItems", id), updates);
  fetchMediaItems();
}

async function deleteMediaItem(id) {
  await deleteDoc(doc(db, "mediaItems", id));
  fetchMediaItems();
}

/* ---------- RENDER ---------- */

function render() {
  const list = document.getElementById("reading-list");
  list.innerHTML = "";

  mediaItems.forEach(item => {
    const li = document.createElement("li");

    const a = document.createElement("a");
    a.href = item.url;
    a.textContent = item.title;
    a.target = "_blank";
    li.appendChild(a);

    if (item.category) {
      const span = document.createElement("span");
      span.textContent = ` [${item.category}]`;
      span.style.color = "gray";
      li.appendChild(span);
    }

    if (isAdmin) {
      const edit = document.createElement("button");
      edit.textContent = "Edit";
      edit.onclick = () => {
        const cat = prompt("New category:", item.category || "");
        if (cat !== null) {
          updateMediaItem(item.id, { category: cat });
        }
      };

      const del = document.createElement("button");
      del.textContent = "Delete";
      del.style.color = "red";
      del.onclick = () => deleteMediaItem(item.id);

      li.appendChild(edit);
      li.appendChild(del);
    }

    list.appendChild(li);
  });
}

/* ---------- FORM ---------- */

document.getElementById("add-media-form").addEventListener("submit", (e) => {
  e.preventDefault();

  addMediaItem(
    document.getElementById("media-title").value,
    document.getElementById("media-url").value,
    document.getElementById("media-category").value
  );

  e.target.reset();
});

/* ---------- AUTH ---------- */

onAuthStateChanged(auth, (user) => {
  isAdmin = false;

  if (user && user.email === "lucioegbert18@gmail.com") {
    isAdmin = true;
    unlockAdmin();
  }

  fetchMediaItems();
});

/* ---------- LOGOUT ---------- */

window.logout = function () {
  signOut(auth).then(() => location.reload());
};

</script>

</body>
</html>

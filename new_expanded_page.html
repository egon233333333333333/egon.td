<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>media</title>

<style>
body {
  font-family: Times New Roman, sans-serif;
  background-color: #877360;
  margin: 0;
  padding: 0;
  color: grey;
}

.container {
  max-width: 800px;
  margin: 0 auto;
}

#header {
  background-image: url("https://i.pinimg.com/originals/c2/64/b7/c264b7874818f50253fbc95b348bb466.gif");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  padding: 20px;
  text-align: center;
  margin-bottom: 20px;
}

.title a {
  color: #FFF073;
  text-decoration: none;
}

.subtitle a {
  color: grey;
  font-family: Courier New;
  text-decoration: none;
}

.content-container {
  border: 1px solid grey;
  background-color: #EBE4E4;
  padding: 20px;
  margin-top: 20px;
  text-align: left;
}

/* LINKS */
a {
  color: black;
  text-decoration: none;
}


/* LIST */
ul {
  list-style: none;
  padding: 0;
}

li {
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #ddd;
}

/* FORM */
input, button {
  font-family: Times New Roman, sans-serif;
  padding: 6px;
  margin: 4px 0;
  border: 1px solid #333;
}

input {
  width: 100%;
  background: #f5f5f5;
}

button {
  background: transparent;
  cursor: pointer;
  color: black;
}

button:hover {
  background: brown;
  color: white;
}

/* ADMIN PANEL */
#admin-panel {
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

  <div id="header">
    <h1 class="title"><a href="index.html">egon.td</a></h1>
    <h3 class="subtitle"><a href="index.html">for the algorithm averse.</a></h3>
  </div>

  <div class="content-container">

    <h2>curated media</h2>
    <a href="index.html">back to home</a><br><br>


    <!-- ADMIN PANEL -->
    <div id="admin-panel" style="display:none;">
      <form id="add-media-form">
        <input type="text" id="media-title" placeholder="Title" required />
        <input type="url" id="media-url" placeholder="URL" required />
        <input type="text" id="media-category" placeholder="Category" />
        <button type="submit">Add</button>
      </form>
      <hr>
    </div>

    <ul id="reading-list"></ul>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7JjchZL7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
  storageBucket: "egontd-b9357.firebasestorage.app",
  messagingSenderId: "241512022087",
  appId: "1:241512022087:web:0ad7a133f1d146fdc4b162"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const mediaCollection = collection(db, "mediaItems");

let isAdmin = false;

let mediaItems = [];

/* AUTH */
onAuthStateChanged(auth, async (user) => {

  console.log("AUTH:", user);

  if (
    user &&
    user.email &&
    user.email.toLowerCase() === "lucioegbert18@gmail.com"
  ) {
    isAdmin = true;

    document.getElementById("admin-panel").style.display = "block";

  } else {

    isAdmin = false;

    document.getElementById("admin-panel").style.display = "none";
  }

  await fetchMediaItems();
});

/* FETCH */
async function fetchMediaItems() {

  const snapshot = await getDocs(mediaCollection);

  mediaItems = snapshot.docs.map(d => ({
    id: d.id,
    ...d.data()
  }));

  render();
}

/* ADD */
async function addMediaItem(title, url, category) {

  if (!isAdmin) return;

  await addDoc(mediaCollection, {
    title,
    url,
    category,
    date: new Date().toISOString()
  });

  await fetchMediaItems();
}

/* UPDATE */
async function updateMediaItem(id, updates) {

  if (!isAdmin) return;

  await updateDoc(doc(db, "mediaItems", id), updates);

  await fetchMediaItems();
}

/* DELETE */
async function deleteMediaItem(id) {

  if (!isAdmin) return;

  await deleteDoc(doc(db, "mediaItems", id));

  await fetchMediaItems();
}

/* RENDER */
function render() {

  const list = document.getElementById("reading-list");

  list.innerHTML = "";

  mediaItems.forEach(item => {

    const li = document.createElement("li");

    const a = document.createElement("a");

    a.href = item.url;

    a.textContent = item.title;

    a.target = "_blank";

    li.appendChild(a);

    if (item.category) {

      const span = document.createElement("span");

      span.textContent = ` [${item.category}]`;

      li.appendChild(span);
    }

    if (isAdmin) {

      const editBtn = document.createElement("button");

      editBtn.textContent = "Edit";

      editBtn.onclick = () => {

        const newTitle = prompt("Title:", item.title);

        const newURL = prompt("URL:", item.url);

        const newCategory = prompt(
          "Category:",
          item.category || ""
        );

        if (newTitle === null || newURL === null) return;

        updateMediaItem(item.id, {
          title: newTitle.trim(),
          url: newURL.trim(),
          category: newCategory.trim()
        });
      };

      const deleteBtn = document.createElement("button");

      deleteBtn.textContent = "Delete";

      deleteBtn.onclick = () => {
        deleteMediaItem(item.id);
      };

      li.appendChild(editBtn);

      li.appendChild(deleteBtn);
    }

    list.appendChild(li);
  });
}

/* FORM */
document.getElementById("add-media-form")
.addEventListener("submit", async (e) => {

  e.preventDefault();

  await addMediaItem(
    document.getElementById("media-title").value,
    document.getElementById("media-url").value,
    document.getElementById("media-category").value
  );

  e.target.reset();
});
</script>
</body>
</html>

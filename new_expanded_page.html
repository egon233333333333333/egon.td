<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>media</title>
</head>

<body style="background-color:powderblue;">

<h2>curated media</h2><br>
  <h4>loading list, please wait...</h4>

<!-- ADMIN PANEL (hidden for guests) -->
<div id="admin-panel" style="display:none;">
  <form id="add-media-form">
    <input type="text" id="media-title" placeholder="Title" required />
    <input type="url" id="media-url" placeholder="URL" required />
    <input type="text" id="media-category" placeholder="Category"/>
    <button type="submit">Add</button>
  </form>
</div>

<ul id="reading-list"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7JjchLZ7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
  storageBucket: "egontd-b9357.firebasestorage.app",
  messagingSenderId: "241512022087",
  appId: "1:241512022087:web:0ad7a133f1d146fdc4b162"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

await setPersistence(auth, browserLocalPersistence);

const mediaCollection = collection(db, "mediaItems");

let isAdmin = false;
let mediaItems = [];

/* AUTH (NO REDIRECT) */
onAuthStateChanged(auth, (user) => {

  if (user && user.email === "lucioegbert18@gmail.com") {
    isAdmin = true;
    document.getElementById("admin-panel").style.display = "block";
  } else {
    isAdmin = false;
    document.getElementById("admin-panel").style.display = "none";
  }

  fetchMediaItems(); // always load for guests + admin
});

/* CRUD (PROTECTED) */

async function fetchMediaItems() {
  const snapshot = await getDocs(mediaCollection);
  mediaItems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
}

async function addMediaItem(title, url, category) {
  if (!isAdmin) return;

  await addDoc(mediaCollection, { title, url, category });
  fetchMediaItems();
}

async function updateMediaItem(id, updates) {
  if (!isAdmin) return;

  await updateDoc(doc(db, "mediaItems", id), updates);
  fetchMediaItems();
}

async function deleteMediaItem(id) {
  if (!isAdmin) return;

  await deleteDoc(doc(db, "mediaItems", id));
  fetchMediaItems();
}

/* RENDER */

function render() {
  const list = document.getElementById("reading-list");
  list.innerHTML = "";

  mediaItems.forEach(item => {
    const li = document.createElement("li");

    const a = document.createElement("a");
    a.href = item.url;
    a.textContent = item.title;
    a.target = "_blank";
    li.appendChild(a);

    if (item.category) {
      const span = document.createElement("span");
      span.textContent = ` [${item.category}]`;
      li.appendChild(span);
    }

    if (isAdmin) {
      const edit = document.createElement("button");
      edit.textContent = "Edit";
      edit.onclick = () => {
        const cat = prompt("New category:", item.category || "");
        if (cat !== null) updateMediaItem(item.id, { category: cat });
      };

      const del = document.createElement("button");
      del.textContent = "Delete";
      del.onclick = () => deleteMediaItem(item.id);

      li.appendChild(edit);
      li.appendChild(del);
    }

    list.appendChild(li);
  });
}

/* FORM */

document.getElementById("add-media-form").addEventListener("submit", (e) => {
  e.preventDefault();

  addMediaItem(
    document.getElementById("media-title").value,
    document.getElementById("media-url").value,
    document.getElementById("media-category").value
  );

  e.target.reset();
});
</script>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>media</title>

<style>
body {
  font-family: Times New Roman, sans-serif;
  background-color: #877360;
  margin: 0;
  padding: 0;
  color: grey;
}

.container {
  max-width: 800px;
  margin: 0 auto;
}

#header {
  background-image: url("https://i.pinimg.com/originals/c2/64/b7/c264b7874818f50253fbc95b348bb466.gif");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  padding: 20px;
  text-align: center;
  margin-bottom: 20px;
}

.title a {
  color: #FFF073;
  text-decoration: none;
}

.subtitle a {
  color: grey;
  font-family: Courier New;
  text-decoration: none;
}

.content-container {
  border: 1px solid grey;
  background-color: #EBE4E4;
  padding: 20px;
  margin-top: 20px;
  text-align: left;
}

a {
  color: black;
  text-decoration: none;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #ddd;
}

input, button {
  font-family: Times New Roman, sans-serif;
  padding: 6px;
  margin: 4px 0;
  border: 1px solid #333;
}

input {
  width: 100%;
  background: #f5f5f5;
}

button {
  background: transparent;
  cursor: pointer;
  color: black;
}

button:hover {
  background: brown;
  color: white;
}

#admin-panel {
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

  <div id="header">
    <h1 class="title"><a href="index.html">egon.td</a></h1>
    <h3 class="subtitle"><a href="index.html">for the algorithm averse.</a></h3>
  </div>

  <div class="content-container">

    <h2>curated media</h2>
    <a href="index.html">back to home</a>

    <br><br>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" style="display:none;">

      <input id="media-title" placeholder="Title">
      <input id="media-url" placeholder="URL">
      <input id="media-category" placeholder="Category">

      <button onclick="addMedia()">Add</button>

      <hr>
    </div>

    <ul id="reading-list"></ul>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyD7JjchLZ7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
  storageBucket: "egontd-b9357.appspot.com",
  messagingSenderId: "241512022087",
  appId: "1:241512022087:web:0ad7a133f1d146fdc4b162"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const col = collection(db, "mediaItems");

let isAdmin = false;

/* AUTH (SAME PATTERN AS YOUR WORKING PAGE) */
onAuthStateChanged(auth, async (user) => {

  console.log("AUTH:", user);

  isAdmin =
    user &&
    user.email &&
    user.email.toLowerCase() === "lucioegbert18@gmail.com";

  document.getElementById("admin-panel").style.display =
    isAdmin ? "block" : "none";

  loadMedia();
});

/* ADD */
window.addMedia = async function () {

  if (!isAdmin) return;

  const title = document.getElementById("media-title").value.trim();
  const url = document.getElementById("media-url").value.trim();
  const category = document.getElementById("media-category").value.trim();

  if (!title || !url) return;

  await addDoc(col, {
    title,
    url,
    category,
    date: new Date().toISOString()
  });

  loadMedia();
};

/* LOAD */
async function loadMedia() {

  const list = document.getElementById("reading-list");
  list.innerHTML = "";

  const snapshot = await getDocs(col);

  snapshot.forEach((d) => {

    const item = d.data();
    const id = d.id;

    const li = document.createElement("li");

    li.innerHTML = `
      <a href="${item.url}" target="_blank">${item.title}</a>
      ${item.category ? `[${item.category}]` : ""}
    `;

    if (isAdmin) {

      const editBtn = document.createElement("button");
      editBtn.textContent = "Edit";

      editBtn.onclick = async () => {

        const t = prompt("Title:", item.title);
        const u = prompt("URL:", item.url);
        const c = prompt("Category:", item.category || "");

        if (!t || !u) return;

        await updateDoc(doc(db, "mediaItems", id), {
          title: t.trim(),
          url: u.trim(),
          category: c.trim()
        });

        loadMedia();
      };

      const delBtn = document.createElement("button");
      delBtn.textContent = "Delete";

      delBtn.onclick = async () => {

        await deleteDoc(doc(db, "mediaItems", id));

        loadMedia();
      };

      li.appendChild(editBtn);
      li.appendChild(delBtn);
    }

    list.appendChild(li);
  });
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="https://i.pinimg.com/736x/25/65/d1/2565d1c3b2f7141bfdcdca78154656e8.jpg" type="image/png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>media</title>
</head>

<body style="background-color:powderblue;">

<h2>curated media</h2>
<h4>the list is loading...please wait...it takes a minute....</h4>

<!-- ADMIN CONTROLS -->
<div id="admin-panel" style="display:none; margin-bottom:20px;">

  <form id="add-media-form" style="display:none;">
    <input type="text" id="media-title" placeholder="Enter title" required />
    <input type="url" id="media-url" placeholder="Enter URL" required />
    <input type="text" id="media-category" placeholder="Enter category (optional)"/>
    <button type="submit">Add Media</button>
  </form>

  <button onclick="logout()">Logout</button>
</div>

<ul id="reading-list"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7JjchZL7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
  storageBucket: "egontd-b9357.firebasestorage.app",
  messagingSenderId: "241512022087",
  appId: "1:241512022087:web:0ad7a133f1d146fdc4b162"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const mediaCollection = collection(db, "mediaItems");

let mediaItems = [];
let isAuthenticated = false;

/* ---------- ADMIN UI ---------- */
function unlockAdmin() {
  document.getElementById("admin-panel").style.display = "block";
  document.getElementById("add-media-form").style.display = "block";
}

/* ---------- FIREBASE ---------- */
async function fetchMediaItems() {
  const snapshot = await getDocs(mediaCollection);
  mediaItems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  populateList();
}

async function addMediaItem(title, url, category = "") {
  await addDoc(mediaCollection, {
    title,
    url,
    category,
    isFavorite: false
  });
  fetchMediaItems();
}

async function updateMediaItem(id, updates) {
  await updateDoc(doc(db, "mediaItems", id), updates);
  fetchMediaItems();
}

async function deleteMediaItem(id) {
  await deleteDoc(doc(db, "mediaItems", id));
  fetchMediaItems();
}

/* ---------- RENDER ---------- */
function populateList() {
  const list = document.getElementById("reading-list");
  list.innerHTML = "";

  mediaItems.forEach((item) => {
    const li = document.createElement("li");

    const link = document.createElement("a");
    link.href = item.url;
    link.textContent = item.title;
    link.target = "_blank";
    li.appendChild(link);

    if (item.category) {
      const cat = document.createElement("span");
      cat.textContent = ` [${item.category}]`;
      cat.style.color = "gray";
      li.appendChild(cat);
    }

    if (isAuthenticated) {
      const editBtn = document.createElement("button");
      editBtn.textContent = "Edit Category";
      editBtn.style.marginLeft = "10px";
      editBtn.onclick = () => {
        const newCat = prompt("Enter new category:", item.category || "");
        if (newCat !== null) {
          updateMediaItem(item.id, { category: newCat });
        }
      };
      li.appendChild(editBtn);

      const delBtn = document.createElement("button");
      delBtn.textContent = "Delete";
      delBtn.style.marginLeft = "5px";
      delBtn.style.color = "red";
      delBtn.onclick = () => deleteMediaItem(item.id);
      li.appendChild(delBtn);
    }

    list.appendChild(li);
  });
}

/* ---------- FORM ---------- */
document.getElementById("add-media-form").addEventListener("submit", (e) => {
  e.preventDefault();

  addMediaItem(
    document.getElementById("media-title").value,
    document.getElementById("media-url").value,
    document.getElementById("media-category").value
  );

  e.target.reset();
});

/* ---------- AUTH CHECK ---------- */
onAuthStateChanged(auth, (user) => {
  if (user && user.email === "lucioegbert18@gmail.com") {
    isAuthenticated = true;
    unlockAdmin();
  }

  fetchMediaItems();
});

/* ---------- LOGOUT ---------- */
window.logout = function () {
  signOut(auth).then(() => {
    location.reload();
  });
};

</script>

</body>
</html>

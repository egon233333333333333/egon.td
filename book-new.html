<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>album</title>

<style>
body {
  font-family: Times New Roman, sans-serif;
  background-color: #877360;
  margin: 0;
  color: grey;
}

.container {
  max-width: 800px;
  margin: auto;
}

#header {
  background: #222;
  padding: 15px;
  text-align: center;
}

.content {
  background: #EBE4E4;
  padding: 20px;
  border: 1px solid grey;
}

img {
  width: 100%;
  margin-bottom: 10px;
}

a { color: black; }

/* music stays invisible */
#music iframe {
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <div id="header">
    <a href="gallery.html">← back to gallery</a>
  </div>

  <div class="content">

    <h2 id="title"></h2>

    <!-- MUSIC CONTAINER -->
    <div id="music"></div>

    <!-- PHOTOS -->
    <div id="photos"></div>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7JjchLZ7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadAlbum() {

  const ref = doc(db, "albums", id);
  const snap = await getDoc(ref);

  if (!snap.exists()) return;

  const data = snap.data();

  // TITLE
  document.getElementById("title").innerText = data.title;

  // MUSIC (YouTube autoplay)
  if (data.music) {
    const music = document.getElementById("music");

    music.innerHTML = `
      <iframe
        width="0"
        height="0"
        src="https://www.youtube.com/embed/${data.music}?autoplay=1&loop=1&playlist=${data.music}&mute=1"
        frameborder="0"
        allow="autoplay">
      </iframe>
    `;
  }

  // PHOTOS
  const container = document.getElementById("photos");

  data.photos.forEach(url => {
    const img = document.createElement("img");
    img.src = url.trim();
    container.appendChild(img);
  });
}

loadAlbum();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body style="background:#0d0d0d; color:#e0e0e0; font-family:Courier New; display:flex; height:100vh; align-items:center; justify-content:center;">

<div style="border:1px solid #333; padding:30px; text-align:center;">
  <h2>ADMIN LOGIN</h2>

  <input type="password" id="password" placeholder="Enter password" style="padding:10px; width:200px;">
  <br><br>

  <button onclick="login()" style="padding:10px 20px;">Enter</button>

  <p id="error" style="color:red; display:none;">Wrong password</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7JjchLZ7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
  appId: "1:241512022087:web:0ad7a133f1d146fdc4b162"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function () {
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(
      auth,
      "kluciocs@gmail.com", // MUST match your Firebase user
      password
    );

    window.location.href = "media.html";

  } catch (error) {
    document.getElementById("error").style.display = "block";
  }
};
</script>

</body>
</html>

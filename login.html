<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body style="background:#0d0d0d; color:#e0e0e0; font-family:Courier New; display:flex; height:100vh; align-items:center; justify-content:center;">

<div style="border:1px solid #333; padding:30px; text-align:center;">
  <h2>ADMIN PANEL</h2>

  <div id="login-box">
    <input type="password" id="password" placeholder="Enter password">
    <br><br>
    <button onclick="login()">Login</button>
    <p id="error" style="color:red; display:none;">Wrong password</p>
  </div>

  <div id="logged-in-box" style="display:none;">
    <p id="status"></p>
    <button onclick="logout()">Logout</button>
    <br><br>
    <button onclick="goToAdmin()">Go to Media Page</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7JjchLZ7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
  storageBucket: "egontd-b9357.firebasestorage.app",
  messagingSenderId: "241512022087",
  appId: "1:241512022087:web:0ad7a133f1d146fdc4b162"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

await setPersistence(auth, browserLocalPersistence);

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("login-box").style.display = "none";
    document.getElementById("logged-in-box").style.display = "block";
    document.getElementById("status").textContent = "Logged in as: " + user.email;
  } else {
    document.getElementById("login-box").style.display = "block";
    document.getElementById("logged-in-box").style.display = "none";
  }
});

/* LOGIN */
window.login = async function () {
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, "lucioegbert18@gmail.com", password);
  } catch {
    document.getElementById("error").style.display = "block";
  }
};

/* LOGOUT */
window.logout = function () {
  signOut(auth);
};

/* NAVIGATION */
window.goToAdmin = function () {
  window.location.href = "new_expanded_page.html";
};
</script>

</body>
</html>

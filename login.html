<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body style="background:#0d0d0d; color:#e0e0e0; font-family:Courier New; display:flex; height:100vh; align-items:center; justify-content:center;">

<div style="border:1px solid #333; padding:30px; text-align:center;">
  <h2>ADMIN LOGIN</h2>

  <input type="password" id="password" placeholder="Enter password" style="padding:10px; width:200px;">
  <br><br>

  <button onclick="login()" style="padding:10px 20px;">Enter</button>

  <p id="error" style="color:red; display:none;">Wrong password</p>
</div>

<script>
function login() {
  const pass = document.getElementById("password").value;

  if (pass === "Connect1@") {
    localStorage.setItem("isAdmin", "true");
    window.location.href = "media.html"; // redirect to your page
  } else {
    document.getElementById("error").style.display = "block";
  }
}
</script>

</body>
</html>

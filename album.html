<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>album</title>

<style>
body {
  font-family: Times New Roman, sans-serif;
  background-color: #877360;
  margin: 0;
  color: grey;
}

.container {
  max-width: 800px;
  margin: auto;
}

#header {
  background: #222;
  padding: 15px;
  text-align: center;
}

.content {
  background: #EBE4E4;
  padding: 20px;
  border: 1px solid grey;
}

img {
  width: 100%;
  margin-bottom: 10px;
}
a { color: black; }
</style>
</head>

<body>

<div class="container">

  <div id="header">
    <a href="gallery.html">← back to gallery</a>
  </div>

  <div class="content">
    <h2 id="title"></h2>

    <div id="musicControls">
  <button onclick="rewindMusic()">⏮</button>
  <button onclick="toggleMusic()">▶ / ⏸</button>
  <button onclick="restartMusic()">🔁</button>
  <button onclick="skipMusic()">⏭</button>
    </div>

    <div id="photos"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getFirestore, doc, getDoc
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7JjchLZ7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadAlbum() {
  const ref = doc(db, "albums", id);
  const snap = await getDoc(ref);

  if (!snap.exists()) return;

  const data = snap.data();

  let audio;

  if (data.music) {
  audio = new Audio(data.music);

  audio.id = "bgMusic";
  audio.loop = true;
  audio.volume = 0.2;

  document.querySelector(".content").prepend(audio);

  audio.play().catch(() => {
    console.log("Autoplay blocked");
  });
}

  if (data.music) {
  const audio = new Audio(data.music);

  audio.autoplay = true;
  audio.loop = true;
  audio.volume = 0.2;

  audio.id = "bgMusic";

  document.querySelector(".content").prepend(audio);

  // IMPORTANT: attempt play safely
  audio.play().catch(() => {
    console.log("Autoplay blocked — user interaction needed");
  });
}

  document.getElementById("title").innerText = data.title;

  const container = document.getElementById("photos");

  data.photos.forEach(url => {
    const img = document.createElement("img");
    img.src = url.trim();
    container.appendChild(img);
  });
}

loadAlbum();

  function getAudio() {
  return document.getElementById("bgMusic");
}

window.toggleMusic = function () {
  const audio = getAudio();
  if (!audio) return;

  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
};

window.restartMusic = function () {
  const audio = getAudio();
  if (!audio) return;

  audio.currentTime = 0;
  audio.play();
};

window.skipMusic = function () {
  const audio = getAudio();
  if (!audio) return;

  audio.currentTime += 10;
};

window.rewindMusic = function () {
  const audio = getAudio();
  if (!audio) return;

  audio.currentTime -= 10;
  if (audio.currentTime < 0) audio.currentTime = 0;
};

</script>

</body>
</html>

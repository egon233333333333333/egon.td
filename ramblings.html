<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ramblings</title>

<style>
body {
  font-family: Times New Roman, sans-serif;
  background-color: #877360;
  margin: 0;
  padding: 0;
  color: grey;
}

.container {
  max-width: 800px;
  margin: 0 auto;

#header {
  background-image: url("https://i.pinimg.com/originals/c2/64/b7/c264b7874818f50253fbc95b348bb466.gif");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  padding: 20px;
  text-align: center;
  margin-bottom: 20px;
}

.title a {
  color: #FFF073;
  text-decoration: none;
}

.subtitle a {
  color: grey;
  font-family: Courier New;
  text-decoration: none;
}

.content-container {
  border: 1px solid grey;

}

/* LINKS */
a {
  color: black;
  text-decoration: none;
}

/* ADMIN AREA */
textarea, button {
  font-family: Times New Roman, sans-serif;
  border: 1px solid #333;

}

button {
  background: transparent;

}

button:hover {

}

.thought {
  margin-bottom: 15px;
  padding-bottom: 10px;
  border-bottom: 1px solid #ccc;
}

.date {
  font-size: 0.8em;
  color: gray;
}

  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

  <div id="header">
    <h1 class="title"><a href="index.html">egon.td</a></h1>
    <h3 class="subtitle"><a href="index.html">for the algorithm averse.</a></h3>
  </div>

  <div class="content-container">

    <h1>ramblings</h1>

    <p><a href="index.html">back to home</a></p>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" style="display:none;">
      <textarea id="thoughtText" rows="3" placeholder="Write your thought..."></textarea><br>
      <button onclick="addThought()">Add Thought</button>
      <hr>
    </div>

    <div id="thoughts"></div>

  </div>
</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  updateDoc,
  deleteDoc,
  doc
}
from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7JjchZL7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
  storageBucket: "egontd-b9357.appspot.com", // FIXED
  messagingSenderId: "241512022087",
  appId: "1:241512022087:web:0ad7a133f1d146fdc4b162"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const col = collection(db, "mediaItems");

let isAdmin = false;

/* AUTH (MATCH RAMBLINGS STYLE) */
onAuthStateChanged(auth, async (user) => {

  console.log("AUTH:", user);

  if (
    user &&
    user.email &&
    user.email.toLowerCase() === "lucioegbert18@gmail.com"
  ) {
    isAdmin = true;
    document.getElementById("admin-panel").style.display = "block";
  } else {
    isAdmin = false;
    document.getElementById("admin-panel").style.display = "none";
  }

  await loadMedia();
});

/* ADD */
window.addMedia = async function () {

  if (!isAdmin) return;

  const title = document.getElementById("media-title").value.trim();
  const url = document.getElementById("media-url").value.trim();
  const category = document.getElementById("media-category").value.trim();

  if (!title || !url) return;

  await addDoc(col, {
    title,
    url,
    category,
    date: new Date().toISOString()
  });

  await loadMedia();
};

/* LOAD */
async function loadMedia() {

  const list = document.getElementById("reading-list");

  list.innerHTML = "";

  const snapshot = await getDocs(col);

  snapshot.forEach((d) => {

    const item = d.data();
    const id = d.id;

    const li = document.createElement("li");

    li.innerHTML = `
      <a href="${item.url}" target="_blank">${item.title}</a>
      ${item.category ? `[${item.category}]` : ""}
    `;

    if (isAdmin) {

      const editBtn = document.createElement("button");
      editBtn.textContent = "Edit";

      editBtn.onclick = async () => {

        const newTitle = prompt("Title:", item.title);
        const newURL = prompt("URL:", item.url);
        const newCat = prompt("Category:", item.category || "");

        if (newTitle === null || newURL === null) return;

        await updateDoc(doc(db, "mediaItems", id), {
          title: newTitle.trim(),
          url: newURL.trim(),
          category: newCat.trim()
        });

        await loadMedia();
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Delete";

      deleteBtn.onclick = async () => {

        if (!confirm("Delete this item?")) return;

        await deleteDoc(doc(db, "mediaItems", id));

        await loadMedia();
      };

      li.appendChild(editBtn);
      li.appendChild(deleteBtn);
    }

    list.appendChild(li);
  });
}

</script>

</body>
</html>

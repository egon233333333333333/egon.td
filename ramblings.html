<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ramblings</title>

<style>
  body {
    background: black;
    color: white;
    font-family: monospace;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 600px;
    padding: 20px;
  }

  textarea, button {
    background: black;
    color: white;
    border: 1px solid white;
    font-family: monospace;
    padding: 6px;
    margin-top: 5px;
  }

  textarea {
    width: 100%;
  }

  .thought {
    margin-bottom: 15px;
  }

  .date {
    font-size: 0.8em;
    color: #aaa;
  }

  a {
    color: yellow;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>

<div class="container">

  <h1><a href="index.html" style="color:yellow;">back to home</a></h1>
  <h1 style="color:yellow;">ramblings</h1>

  <!-- ADMIN PANEL (hidden by default) -->
  <div id="admin-panel" style="display:none;">
    <textarea id="thoughtText" rows="3" placeholder="Write your thought..."></textarea><br>
    <button onclick="addThought()">Add Thought</button>
    <button onclick="logout()">Logout</button>
    <hr>
  </div>

  <!-- PUBLIC THOUGHTS -->
  <div id="thoughts"></div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  updateDoc,
  deleteDoc,
  doc,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7JjchLZ7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
  storageBucket: "egontd-b9357.appspot.com",
  messagingSenderId: "241512022087",
  appId: "1:241512022087:web:0ad7a133f1d146fdc4b162"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db, "thoughts");

/* ---------- AUTH ---------- */
function isAdmin() {
  return localStorage.getItem("isAdmin") === "true";
}

/* ---------- SHOW ADMIN UI IF LOGGED IN ---------- */
function unlockAdmin() {
  document.getElementById("admin-panel").style.display = "block";
}

/* ---------- ADD ---------- */
window.addThought = async function () {
  const text = document.getElementById("thoughtText").value.trim();

  if (text) {
    await addDoc(col, {
      text,
      date: new Date().toLocaleString()
    });

    document.getElementById("thoughtText").value = "";
    loadThoughts();
  }
};

/* ---------- LOAD ---------- */
async function loadThoughts() {
  const container = document.getElementById("thoughts");
  container.innerHTML = "";

  const q = query(col, orderBy("date", "desc"));
  const snapshot = await getDocs(q);

  snapshot.forEach((d) => {
    const t = d.data();
    const id = d.id;

    const div = document.createElement("div");
    div.className = "thought";

    div.innerHTML = `
      <div>${t.text}</div>
      <div class="date">${t.date}</div>

      ${isAdmin() ? `
        <button onclick="editThought('${id}', \`${t.text.replace(/`/g, "\\`")}\`)">Edit</button>
        <button onclick="deleteThought('${id}')">Delete</button>
      ` : ""}
    `;

    container.appendChild(div);
  });
}

/* ---------- EDIT ---------- */
window.editThought = async function (id, currentText) {
  const newText = prompt("Edit:", currentText);

  if (newText !== null) {
    await updateDoc(doc(db, "thoughts", id), {
      text: newText
    });

    loadThoughts();
  }
};

/* ---------- DELETE ---------- */
window.deleteThought = async function (id) {
  if (confirm("Delete this thought?")) {
    await deleteDoc(doc(db, "thoughts", id));
    loadThoughts();
  }
};

/* ---------- LOGOUT ---------- */
window.logout = function () {
  localStorage.removeItem("isAdmin");
  location.reload();
};

/* ---------- INIT ---------- */
window.onload = function () {
  if (isAdmin()) {
    unlockAdmin();
  }

  loadThoughts();
};
</script>

</body>
</html>

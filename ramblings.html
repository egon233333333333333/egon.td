<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ramblings</title>

<style>
body {
  font-family: Times New Roman, sans-serif;
  background-color: #877360;
  margin: 0;
  padding: 0;
  color: grey;
}

.container {
  max-width: 800px;
  margin: 0 auto;
}

#header {
  background-image: url("https://i.pinimg.com/originals/c2/64/b7/c264b7874818f50253fbc95b348bb466.gif");
  background-size: 100% 100%;
  background-repeat: no-repeat;
  padding: 20px;
  text-align: center;
  margin-bottom: 20px;
}

.title a {
  color: #FFF073;
  text-decoration: none;
}

.subtitle a {
  color: grey;
  font-family: Courier New;
  text-decoration: none;
}

.content-container {
  border: 1px solid grey;
  background-color: #EBE4E4;
  padding: 20px;
  margin-top: 20px;
  text-align: left;
}

/* LINKS */
a {
  color: black;
  text-decoration: none;
}


/* ADMIN AREA */
textarea, button {
  font-family: Times New Roman, sans-serif;
  border: 1px solid #333;
  padding: 6px;
  margin-top: 5px;
}

textarea {
  width: 100%;
  background: #f5f5f5;
}

button {
  background: transparent;
  color: black;
  cursor: pointer;
}

button:hover {
  background: brown;
  color: white;
}

/* THOUGHT BLOCKS */
.thought {
  margin-bottom: 15px;
  padding-bottom: 10px;
  border-bottom: 1px solid #ccc;
}

.date {
  font-size: 0.8em;
  color: gray;
}

#admin-panel {
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER (same template style) -->
  <div id="header">
    <h1 class="title"><a href="index.html">egon.td</a></h1>
    <h3 class="subtitle"><a href="index.html">for the algorithm averse.</a></h3>
  </div>

  <div class="content-container">

    <h1>ramblings</h1>

    <h1><a href="index.html">back to home</a></h1>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" style="display:none;">
      <textarea id="thoughtText" rows="3" placeholder="Write your thought..."></textarea><br>
      <button onclick="addThought()">Add Thought</button>
      <hr>
    </div>

    <div id="thoughts"></div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  updateDoc,
  deleteDoc,
  doc,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7JjchZL7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
  storageBucket: "egontd-b9357.appspot.com",
  messagingSenderId: "241512022087",
  appId: "1:241512022087:web:0ad7a133f1d146fdc4b162"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

await setPersistence(auth, browserLocalPersistence);

const col = collection(db, "thoughts");

let isAdmin = false;

onAuthStateChanged(auth, (user) => {
  if (user && user.email === "lucioegbert18@gmail.com") {
    isAdmin = true;
    document.getElementById("admin-panel").style.display = "block";
  } else {
    isAdmin = false;
    document.getElementById("admin-panel").style.display = "none";
  }

  loadThoughts();
});

window.addThought = async function () {
  if (!isAdmin) return;

  const text = document.getElementById("thoughtText").value.trim();

  if (text) {
    await addDoc(col, {
      text,
      date: new Date().toISOString()
    });

    document.getElementById("thoughtText").value = "";
    loadThoughts();
  }
};

async function loadThoughts() {
  const container = document.getElementById("thoughts");
  container.innerHTML = "";

  const q = query(col, orderBy("date", "desc"));
  const snapshot = await getDocs(q);

  snapshot.forEach((d) => {
    const t = d.data();
    const id = d.id;

    const div = document.createElement("div");
    div.className = "thought";

    div.innerHTML = `
      <div>${t.text}</div>
      <div class="date">${new Date(t.date).toLocaleString()}</div>
    `;

    if (isAdmin) {
      const edit = document.createElement("button");
      edit.textContent = "Edit";
      edit.onclick = () => editThought(id, t.text);

      const del = document.createElement("button");
      del.textContent = "Delete";
      del.onclick = () => deleteThought(id);

      div.appendChild(edit);
      div.appendChild(del);
    }

    container.appendChild(div);
  });
}

window.editThought = async function (id, currentText) {
  if (!isAdmin) return;

  const newText = prompt("Edit:", currentText);

  if (newText !== null) {
    await updateDoc(doc(db, "thoughts", id), {
      text: newText
    });

    loadThoughts();
  }
};

window.deleteThought = async function (id) {
  if (!isAdmin) return;

  if (confirm("Delete this thought?")) {
    await deleteDoc(doc(db, "thoughts", id));
    loadThoughts();
  }
};
</script>

</body>
</html>

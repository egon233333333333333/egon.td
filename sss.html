
<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="https://i.pinimg.com/736x/25/65/d1/2565d1c3b2f7141bfdcdca78154656e8.jpg" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>egon.td</title>

  <style>
    body {
      font-family: Times New Roman, sans-serif;
      background-color: #877360;
      margin: 0;
      padding: 0;
      color: grey;
    }

    img { width: 100%; height: auto; }

    #header {
      background-image: url("https://i.pinimg.com/originals/c2/64/b7/c264b7874818f50253fbc95b348bb466.gif");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .title a {
      color: #FFF073;
      text-decoration: none;
    }

    .subtitle a {
      color: grey;
      font-family: Courier New;
      text-decoration: none;
    }

    .content-container {
      border: 1px solid #666;
      background-color: #EBE4E4;
      padding: 20px;
      margin-top: 20px;
    }

    #reading-list, #socials {
      list-style: none;
      padding: 0;
    }

    #socials a {
      color: black;
      text-decoration: none;
    }

    .ee {
      color: grey;
      font-family: Trebuchet MS;
      font-size: 30px;
    }

    .featured {
      max-width: 500px;
      margin: 0 auto;
    }

    .responsive-iframe {
      width: 100%;
    }

    .contact-form {
      max-width: 500px;
      margin: 80px auto;
      padding: 30px;
      border: 1px solid #333;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px;
      cursor: pointer;
    }

    #video-admin {
      display: none;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <div id="header">
    <h1 class="title"><a href="index.html">egon.td</a></h1>
    <h3 class="subtitle"><a href="index.html">for the algorithm averse.</a></h3>
  </div>

  <div class="content-container">

    <!-- NAV -->
    <p><b>EGON.TD</b> personal site...</p>

    <!-- EXISTING VIDEOS + FIREBASE -->
    <h4>VIDEOS</h4>

    <!-- ADMIN PANEL -->
    <div id="video-admin">
      <input id="video-title" placeholder="Video title"><br><br>
      <input id="video-url" placeholder="YouTube URL"><br><br>
      <button onclick="addVideo()">Add Video</button>
      <hr>
    </div>

    <!-- VIDEO LIST -->
    <div id="video-list">

      <!-- HARD CODED (STAYS ALWAYS) -->
      <div class="featured">
        <p class="ee">the better kpop</p>
        <iframe class="responsive-iframe" height="345"
          src="https://www.youtube.com/embed/qhXrye7zkwY"></iframe>
      </div>

      <div class="featured">
        <p class="ee">The laughing man</p>
        <iframe class="responsive-iframe" height="345"
          src="https://www.youtube.com/embed/XaDxVhRPLdo"></iframe>
      </div>

    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import {
  getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyD7JjchLZ7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
  storageBucket: "egontd-b9357.firebasestorage.app",
  messagingSenderId: "241512022087",
  appId: "1:241512022087:web:0ad7a133f1d146fdc4b162"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const col = collection(db, "videos");

let isAdmin = false;

/* ADMIN CHECK */
onAuthStateChanged(auth, (user) => {
  if (user && user.email === "lucioegbert18@gmail.com") {
    isAdmin = true;
    document.getElementById("video-admin").style.display = "block";
  } else {
    isAdmin = false;
    document.getElementById("video-admin").style.display = "none";
  }
  loadVideos();
});

/* YT ID */
function getId(url) {
  const match = url.match(/(?:youtu\.be\/|v=|embed\/)([^&?/]+)/);
  return match ? match[1] : null;
}

/* ADD VIDEO */
window.addVideo = async function () {
  if (!isAdmin) return;

  const title = document.getElementById("video-title").value;
  const url = document.getElementById("video-url").value;

  if (!title || !url) return;

  await addDoc(col, { title, url });

  document.getElementById("video-title").value = "";
  document.getElementById("video-url").value = "";

  loadVideos();
};

/* LOAD VIDEOS */
async function loadVideos() {
  const container = document.getElementById("video-list");

  const snapshot = await getDocs(col);

  snapshot.forEach((d) => {
    const v = d.data();
    const id = getId(v.url);
    if (!id) return;

    const div = document.createElement("div");
    div.className = "featured";

    div.innerHTML = `
      <p class="ee">${v.title}</p>
      <iframe class="responsive-iframe" height="345"
        src="https://www.youtube.com/embed/${id}">
      </iframe>
    `;

    if (isAdmin) {
      const del = document.createElement("button");
      del.textContent = "Delete";
      del.onclick = async () => {
        await deleteDoc(doc(db, "videos", d.id));
        loadVideos();
      };

      div.appendChild(del);
    }

    container.appendChild(div);
  });
}
</script>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="https://i.pinimg.com/736x/25/65/d1/2565d1c3b2f7141bfdcdca78154656e8.jpg" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>egon.td</title>

  <style>
    body {
      font-family: Times New Roman, sans-serif;
      background-color: #877360;
      margin: 0;
      padding: 0;
      align-content: left;
      color: grey;
    }

    img {
      width: 100%;
      height: auto;
    }

    #header {
      background-image: url("https://i.pinimg.com/originals/c2/64/b7/c264b7874818f50253fbc95b348bb466.gif");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .title a {
      color: #FFF073;
      text-decoration: none;
    }

    .subtitle a {
      color: grey;
      font-family: Courier New;
      text-decoration: none;
    }

    .content-container {
      border: 1px solid #666;
      background-color: #EBE4E4;
      padding: 20px;
      margin-top: 20px;
      text-align: left;
      border-color: grey;
    }

    #reading-list, #socials {
      list-style: none;
      padding: 0;
    }

    #socials a {
      color: black;
      text-decoration: none;
    }

    #reading-list a {
      color: black;
      text-decoration: none;
    }

    .ee {
      color: grey;
      font-family: 'Trebuchet MS', sans-serif;
      font-size: 30px;
    }

    .featured {
      max-width: 500px;
      margin: 0 auto;
    }

    .responsive-iframe {
      width: 100%;
    }

    .contact-form {
      max-width: 500px;
      margin: 80px auto;
      padding: 30px;
      border: 1px solid #333;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #333;
    }

    .contact-form button {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid #888;
      cursor: pointer;
    }

    .contact-form button:hover {
      background: brown;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <div id="header">
    <h1 class="title"><a href="index.html">egon.td</a></h1>
    <h3 class="subtitle"><a href="index.html">for the algorithm averse.</a></h3>
  </div>

  <div class="content-container">

    <!-- YOUR EXISTING CONTENT (UNCHANGED) -->
    <p>CONTENT HERE (UNCHANGED)</p>

    <h4>【❖】fav digital media list</h4>

    <ul id="reading-list">
      <li><a href="#">Example link</a></li>
    </ul>

    <!-- VIDEO ADMIN PANEL -->
    <div id="video-admin" style="display:none; margin-bottom:20px;">
      <input type="text" id="video-title" placeholder="Video title"><br><br>
      <input type="text" id="video-url" placeholder="YouTube URL"><br><br>
      <button onclick="addVideo()">Add Video</button>
      <hr>
    </div>

    <!-- VIDEO LIST -->
    <div id="video-list">

      <!-- HARD CODED VIDEOS (STAYS ALWAYS) -->

      <div class="featured">
        <p class="ee">the better kpop</p>
        <iframe class="responsive-iframe" height="345"
          src="https://www.youtube.com/embed/qhXrye7zkwY"></iframe>
      </div>

      <div class="featured">
        <p class="ee">The laughing man</p>
        <iframe class="responsive-iframe" height="345"
          src="https://www.youtube.com/embed/XaDxVhRPLdo"></iframe>
      </div>

    </div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyD7JjchZL7qcwbBk1BMmYtAPqNrcQcJevA",
  authDomain: "egontd-b9357.firebaseapp.com",
  projectId: "egontd-b9357",
  storageBucket: "egontd-b9357.firebasestorage.app",
  messagingSenderId: "241512022087",
  appId: "1:241512022087:web:0ad7a133f1d146fdc4b162"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const col = collection(db, "videos");

let isAdmin = false;

/* AUTH */
onAuthStateChanged(auth, (user) => {

  isAdmin =
    user &&
    user.email &&
    user.email.toLowerCase() === "lucioegbert18@gmail.com";

  document.getElementById("video-admin").style.display =
    isAdmin ? "block" : "none";

  loadVideos();
});

/* YOUTUBE ID */
function getYoutubeId(url) {
  const match = url.match(/(?:youtu\.be\/|v=|embed\/)([^&?/]+)/);
  return match ? match[1] : null;
}

/* ADD VIDEO */
window.addVideo = async function () {

  if (!isAdmin) return;

  const title = document.getElementById("video-title").value.trim();
  const url = document.getElementById("video-url").value.trim();

  if (!title || !url) return;

  await addDoc(col, { title, url });

  document.getElementById("video-title").value = "";
  document.getElementById("video-url").value = "";

  loadVideos();
};

/* LOAD VIDEOS */
async function loadVideos() {

  const container = document.getElementById("video-list");

  const existing = Array.from(container.querySelectorAll(".featured"))
    .filter(v => !v.dataset.firebase);

  container.innerHTML = "";
  existing.forEach(v => container.appendChild(v));

  const snapshot = await getDocs(col);

  snapshot.forEach((d) => {

    const video = d.data();
    const id = d.id;

    const youtubeId = getYoutubeId(video.url);
    if (!youtubeId) return;

    const div = document.createElement("div");
    div.className = "featured";
    div.dataset.firebase = "true";

    div.innerHTML = `
      <p class="ee">${video.title}</p>
      <iframe class="responsive-iframe" height="345"
        src="https://www.youtube.com/embed/${youtubeId}">
      </iframe>
    `;

    if (isAdmin) {

      const editBtn = document.createElement("button");
      editBtn.textContent = "Edit";

      editBtn.onclick = async () => {
        const t = prompt("Title:", video.title);
        const u = prompt("URL:", video.url);

        if (!t || !u) return;

        await updateDoc(doc(db, "videos", id), {
          title: t,
          url: u
        });

        loadVideos();
      };

      const delBtn = document.createElement("button");
      delBtn.textContent = "Delete";

      delBtn.onclick = async () => {
        await deleteDoc(doc(db, "videos", id));
        loadVideos();
      };

      div.appendChild(editBtn);
      div.appendChild(delBtn);
    }

    container.appendChild(div);
  });
}

</script>

</body>
</html>
